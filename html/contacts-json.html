<html>
<head>
    <meta charset="UTF-8">
    <title>Contacts JSON</title>

    <!-- CSS 연결 -->
    <link rel="stylesheet" href="/style.css">
</head>

<body>

<h1 style="text-align:center;">Contacts List</h1>

<table id="contact-table">
    <thead>
        <tr>
            <th>Name</th>
            <th>Telephone</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<script>
fetch('/cgi-bin/contacts-json.py')
  .then(res => res.json())
  .then(res => {
    const tbody = document.querySelector('#contact-table tbody');

    if (!res.ok) {
        tbody.innerHTML = "<tr><td colspan='2'>Error: " + res.error + "</td></tr>";
        return;
    }

    res.data.forEach(item => {
        const row = document.createElement('tr');

        row.innerHTML = `
            <td>${item.name}</td>
            <td>${item.telephone}</td>
        `;

        tbody.appendChild(row);
    });
  })
  .catch(err => {
    document.querySelector('#contact-table tbody').innerHTML =
      "<tr><td colspan='2'>Fetch error</td></tr>";
  });
</script>

</body>
</html>
